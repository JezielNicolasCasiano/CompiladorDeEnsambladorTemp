# Configuración de ProGuard para CompiladorDeEnsamblador
# Objetivo: reducir el JAR final a menos de 5 MB

# Desactivar la ofuscación
-dontobfuscate

# Desactivar optimizaciones agresivas (compatibilidad)
-dontoptimize

# Ignorar advertencias de dependencias externas
-dontwarn **
-dontnote **

# ─────────────────────────────────────────────────────────────────
# APLICACIÓN PROPIA - conservar todo
# ─────────────────────────────────────────────────────────────────
-keep class jeziel.compiladordeensamblador.** { *; }

# ─────────────────────────────────────────────────────────────────
# JAVAFX PÚBLICO - API de la aplicación
# ─────────────────────────────────────────────────────────────────
-keep class javafx.application.Application { *; }
-keep class javafx.application.Platform { *; }
-keep class javafx.stage.Stage { *; }
-keep class javafx.stage.Window { *; }
-keep class javafx.stage.StageStyle { *; }
-keep class javafx.scene.Scene { *; }
-keep class javafx.scene.Node { *; }
-keep class javafx.scene.Parent { *; }

# FXML (indispensable para cargar la interfaz)
-keep class javafx.fxml.** { *; }
-keepclassmembers class * {
    @javafx.fxml.FXML *;
}

# Layouts usados en FXML
-keep class javafx.scene.layout.AnchorPane { *; }
-keep class javafx.scene.layout.BorderPane { *; }
-keep class javafx.scene.layout.VBox { *; }
-keep class javafx.scene.layout.HBox { *; }
-keep class javafx.scene.layout.Pane { *; }
-keep class javafx.scene.layout.Region { *; }
-keep class javafx.scene.layout.Background { *; }
-keep class javafx.scene.layout.BackgroundFill { *; }
-keep class javafx.scene.layout.CornerRadii { *; }

# Controles usados en FXML
-keep class javafx.scene.control.Control { *; }
-keep class javafx.scene.control.Labeled { *; }
-keep class javafx.scene.control.Button { *; }
-keep class javafx.scene.control.TextArea { *; }
-keep class javafx.scene.control.TextInputControl { *; }
-keep class javafx.scene.control.ScrollPane { *; }
-keep class javafx.scene.control.MenuBar { *; }
-keep class javafx.scene.control.Menu { *; }
-keep class javafx.scene.control.MenuItem { *; }
-keep class javafx.scene.control.Pagination { *; }
-keep class javafx.scene.control.TableView { *; }
-keep class javafx.scene.control.TableColumn { *; }
-keep class javafx.scene.control.cell.PropertyValueFactory { *; }

# Skins de los controles usados
-keep class javafx.scene.control.SkinBase { *; }
-keep class javafx.scene.control.skin.ButtonSkin { *; }
-keep class javafx.scene.control.skin.TextAreaSkin { *; }
-keep class javafx.scene.control.skin.ScrollPaneSkin { *; }
-keep class javafx.scene.control.skin.MenuBarSkin { *; }
-keep class javafx.scene.control.skin.PaginationSkin { *; }
-keep class javafx.scene.control.skin.TableViewSkin { *; }
-keep class javafx.scene.control.skin.TableColumnHeader { *; }
-keep class javafx.scene.control.skin.TableHeaderRow { *; }
-keep class javafx.scene.control.skin.TableRowSkin { *; }
-keep class javafx.scene.control.skin.TableCellSkin { *; }
-keep class javafx.scene.control.skin.VirtualFlow { *; }
-keep class javafx.scene.control.skin.ScrollBarSkin { *; }
-keep class javafx.scene.control.skin.TextInputControlSkin { *; }
-keep class javafx.scene.control.skin.LabeledSkinBase { *; }

# Clases base necesarias (beans, css, collections, events)
-keep class javafx.beans.** { *; }
-keep class javafx.collections.** { *; }
-keep class javafx.css.** { *; }
-keep class javafx.event.** { *; }
-keep class javafx.geometry.** { *; }
-keep class javafx.util.** { *; }
-keep class javafx.scene.text.** { *; }
-keep class javafx.scene.paint.** { *; }
-keep class javafx.scene.input.** { *; }
-keep class javafx.scene.image.** { *; }
-keep class javafx.animation.** { *; }
-keep class javafx.scene.shape.** { *; }

# ─────────────────────────────────────────────────────────────────
# INTERNAS DE JavaFX - solo las mínimas para que funcione
# ─────────────────────────────────────────────────────────────────

# Toolkit y Glass (sistema de ventanas)
-keep class com.sun.javafx.tk.quantum.QuantumToolkit { *; }
-keep class com.sun.javafx.tk.quantum.** { *; }
-keep class com.sun.glass.ui.** { *; }
-keep class com.sun.glass.utils.** { *; }
-keep class * implements com.sun.javafx.tk.Toolkit { *; }

# Prism (renderizador gráfico)
-keep class * implements com.sun.prism.GraphicsPipeline { *; }
-keep class com.sun.prism.** { *; }

# Fuentes
-keep class com.sun.javafx.font.** { *; }
-keep class com.sun.javafx.text.** { *; }

# Geometría
-keep class com.sun.javafx.geom.** { *; }

# Reflexión y FXML interno
-keep class com.sun.javafx.reflect.** { *; }
-keep class com.sun.javafx.fxml.** { *; }

# Aplicación interna
-keep class com.sun.javafx.application.** { *; }
-keep class com.sun.javafx.stage.** { *; }
-keep class com.sun.javafx.event.** { *; }

# CSS interno
-keep class com.sun.javafx.css.** { *; }

# Escena interna y scenegraph
-keep class com.sun.javafx.sg.prism.** { *; }
-keep class com.sun.javafx.scene.NodeHelper { *; }
-keep class com.sun.javafx.scene.SceneHelper { *; }
-keep class com.sun.javafx.scene.ParentHelper { *; }
-keep class com.sun.javafx.scene.GroupHelper { *; }
-keep class com.sun.javafx.scene.layout.** { *; }
-keep class com.sun.javafx.scene.text.** { *; }
-keep class com.sun.javafx.scene.traversal.** { *; }
-keep class com.sun.javafx.scene.input.** { *; }

# Controles internos usados (solo los necesarios para los skins usados)
-keep class com.sun.javafx.scene.control.ControlHelper { *; }
-keep class com.sun.javafx.scene.control.LabeledHelper { *; }
-keep class com.sun.javafx.scene.control.skin.Utils { *; }
-keep class com.sun.javafx.scene.control.behavior.BehaviorBase { *; }
-keep class com.sun.javafx.scene.control.behavior.ButtonBehavior { *; }
-keep class com.sun.javafx.scene.control.behavior.TextAreaBehavior { *; }
-keep class com.sun.javafx.scene.control.behavior.TextInputControlBehavior { *; }
-keep class com.sun.javafx.scene.control.behavior.ScrollPaneBehavior { *; }
-keep class com.sun.javafx.scene.control.behavior.MenuBarBehavior { *; }
-keep class com.sun.javafx.scene.control.behavior.PaginationBehavior { *; }
-keep class com.sun.javafx.scene.control.behavior.TableViewBehaviorBase { *; }
-keep class com.sun.javafx.scene.control.behavior.TableViewBehavior { *; }
-keep class com.sun.javafx.scene.control.behavior.CellBehaviorBase { *; }
-keep class com.sun.javafx.scene.control.behavior.TableCellBehavior { *; }
-keep class com.sun.javafx.scene.control.behavior.TableRowBehavior { *; }

# Bindings internos
-keep class com.sun.javafx.binding.** { *; }
-keep class com.sun.javafx.collections.** { *; }

# Image I/O
-keep class com.sun.javafx.iio.** { *; }
-keep class com.sun.javafx.image.** { *; }

# Efectos y animaciones
-keep class com.sun.scenario.animation.** { *; }
-keep class com.sun.scenario.effect.** { *; }

# Marlin (renderizador de formas 2D)
-keep class com.sun.marlin.** { *; }
-keep class com.sun.pisces.** { *; }
-keep class com.sun.openpisces.** { *; }

# ─────────────────────────────────────────────────────────────────
# ENUMS
# ─────────────────────────────────────────────────────────────────
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# ─────────────────────────────────────────────────────────────────
# ATRIBUTOS ESENCIALES
# ─────────────────────────────────────────────────────────────────
-keepattributes *Annotation*,Signature,EnclosingMethod,InnerClasses,SourceFile,LineNumberTable
